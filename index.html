            box-sizing: border-box;

        body {

            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        .bg-image {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.40;
            pointer-events: none;
            filter: brightness(0.6) saturate(1.2);
        }

        .top-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(90deg, transparent 0%, #ff0000 15%, #ff4444 30%, #ff0000 50%, transparent 70%, #ff0000 85%, transparent 100%);
            background-size: 200% 100%;
            animation: breakLine 2s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255,0,0,0.5);
        }

        @keyframes breakLine {
            0%, 100% { background-position: 0% 0%; opacity: 0.3; }
            50% { background-position: 100% 0%; opacity: 1; }
        }

        .bottom-line {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(90deg, transparent 0%, #ff0000 20%, #ff4444 40%, #ff0000 60%, transparent 100%);
            background-size: 200% 100%;
            animation: breakLine 2.5s ease-in-out infinite reverse;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }

        .line-h, .line-v {
            position: fixed;
            background: rgba(255, 40, 40, 0.05);
            z-index: 1;
            pointer-events: none;
        }
        .line-h {
            height: 1px;
            width: 100%;
            left: -100%;
            animation: slideH 4s linear infinite;
        }
        .line-v {
            width: 1px;
            height: 100%;
            top: -100%;
            animation: slideV 4s linear infinite;
        }

        @keyframes slideH {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        @keyframes slideV {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        .line-h:nth-child(4) { top: 15%; animation-duration: 3.0s; }
        .line-h:nth-child(5) { top: 30%; animation-duration: 3.8s; animation-delay: 0.5s; }
        .line-h:nth-child(6) { top: 45%; animation-duration: 2.8s; animation-delay: 1.0s; }
        .line-h:nth-child(7) { top: 60%; animation-duration: 4.0s; animation-delay: 0.2s; }
        .line-h:nth-child(8) { top: 75%; animation-duration: 2.6s; animation-delay: 0.8s; }
        .line-h:nth-child(9) { top: 90%; animation-duration: 3.4s; animation-delay: 0.4s; }

        .line-v:nth-child(10) { left: 15%; animation-duration: 3.2s; }
        .line-v:nth-child(11) { left: 30%; animation-duration: 3.8s; animation-delay: 0.6s; }
        .line-v:nth-child(12) { left: 45%; animation-duration: 2.8s; animation-delay: 0.3s; }
        .line-v:nth-child(13) { left: 60%; animation-duration: 4.2s; animation-delay: 0.9s; }

                (numero ? "with the number " + numero + " " : "") +
                "who has been " + typeLabel + ". " +
                (details || "I don't know what their problem is, but they've been making my life difficult.") + " " +
                "I've been hesitant to report them because I didn't want to cause trouble, but I realize now that staying silent is not the answer. " +
                "This person needs to be stopped. I'm sure I'm not the only one they're doing this to. " +
                "I have screenshots and I can provide more details if needed. " +
                "Please look into this and take the necessary steps. I just want to be able to use WhatsApp without stress. " +
                "Thank you for understanding.",

                // Style 6 - Simple et honnête (comme l'exemple que tu as donné)
                "Hello WhatsApp Support,\n\nI'm writing to report a user who is both a " + typeLabel + " and extremely rude. " +
                (nom ? "This person is " + nom + ". " : "") +
                (numero ? "Their number is " + numero + ". " : "") +
                "They send fake messages to people, and when you don't fall for it, they start insulting you. " +
                (details || "I've been personally insulted, and I know I'm not the only one. They have no respect for anyone.") + " " +
                "This isn't just spam – it's harassment. They're using WhatsApp to abuse people, and that's not okay. " +
                "Please look into this account and ban it. I have screenshots if you need proof. " +
                "Thanks for your time."
            ];

            var msg = messages[messageIndex % messages.length];
            messageIndex++;
            return msg;
        }

        // ============================================
        // GÉNÉRATION PROGRESSIVE
        // ============================================
        var isGenerating = false;
        var displayText = '';

        function startGeneration() {
            if (isGenerating) return;

            var output = document.getElementById('message-output');
            var box = document.getElementById('generated-box');
            var btnGen = document.getElementById('btn-generate');
            var btnCopy = document.getElementById('btn-copy');
            var btnWa = document.getElementById('btn-wa');
            var status = document.getElementById('status-text');

            isGenerating = true;
            btnGen.disabled = true;
            btnCopy.disabled = true;
            btnWa.disabled = true;
            status.textContent = '⏳ Generating...';
            output.textContent = '';
            box.style.display = 'block';

            var fullMessage = generateFullMessage();
            var chars = fullMessage.split('');
            var index = 0;
            displayText = '';

            function typeNextChar() {
                if (index < chars.length) {
                    displayText += chars[index];
                    output.textContent = displayText;
                    index++;
                    var delay = 12 + Math.random() * 20;
                    setTimeout(typeNextChar, delay);
                } else {
                    isGenerating = false;
                    btnGen.disabled = false;
                    btnCopy.disabled = false;
                    btnWa.disabled = false;
                    status.textContent = '✅ Message ready';
                    status.style.color = '#777';
                    showToast('✅ Message generated');
                }
            }

            setTimeout(typeNextChar, 100);
        }

        function copyMessage() {
            var text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');
            navigator.clipboard.writeText(text).then(function() {
                showToast('📋 Copied');
            }).catch(function() {
                var area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied');
            });
        }

        function sendWhatsApp() {
            var text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');

            navigator.clipboard.writeText(text).then(function() {
                showToast('📋 Copied! Opening WhatsApp...');
            }).catch(function() {
                var area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied! Opening WhatsApp...');
            });

            setTimeout(function() {
                window.open('https://wa.me/', '_blank');
            }, 500);
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(function() {
                t.classList.remove('show');
            }, 2500);
        }
    </script>
